<?xml version="1.0" encoding="utf-8"?>
<j:jelly trim="false" xmlns:j="jelly:core" xmlns:g="glide">
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Planning Poker - Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

        :root {
            --md-bg: #121212;
            --md-surface: #1E1E1E;
            --md-surface-2: #272727;
            --md-surface-3: #2C2C2C;
            --md-primary: #BB86FC;
            --md-primary-variant: #3700B3;
            --md-secondary: #03DAC6;
            --md-error: #CF6679;
            --md-on-primary: #000000;
            --md-on-secondary: #000000;
            --md-on-bg: #FFFFFF;
            --md-on-surface: #E0E0E0;
            --md-on-error: #000000;
            --md-shadow-1: 0 2px 1px -1px rgba(0,0,0,.2), 0 1px 1px 0 rgba(0,0,0,.14), 0 1px 3px 0 rgba(0,0,0,.12);
            --md-shadow-2: 0 3px 1px -2px rgba(0,0,0,.2), 0 2px 2px 0 rgba(0,0,0,.14), 0 1px 5px 0 rgba(0,0,0,.12);
            --md-shadow-4: 0 2px 4px -1px rgba(0,0,0,.2), 0 4px 5px 0 rgba(0,0,0,.14), 0 1px 10px 0 rgba(0,0,0,.12);
            --md-shadow-8: 0 5px 5px -3px rgba(0,0,0,.2), 0 8px 10px 1px rgba(0,0,0,.14), 0 3px 14px 2px rgba(0,0,0,.12);
            --md-shadow-16: 0 8px 10px -5px rgba(0,0,0,.2), 0 16px 24px 2px rgba(0,0,0,.14), 0 6px 30px 5px rgba(0,0,0,.12);
            --radius: 4px;
            --font-family: 'Roboto', -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, sans-serif;
            --base-font-size: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html { font-size: var(--base-font-size); background-color: var(--md-bg); }
        
        body {
            font-family: var(--font-family);
            background-color: var(--md-bg);
            color: var(--md-on-bg);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }
        
        /* Base typography & elements */
        h1, h2, h3, h4, h5, h6 { font-weight: 500; letter-spacing: 0.15px; }
        
        /* Header */
        .header {
            background-color: var(--md-surface-2);
            box-shadow: var(--md-shadow-4);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
        }
        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .logo {
            font-size: 20px;
            font-weight: 500;
            color: var(--md-primary);
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 0.15px;
        }
        .logo-icon { font-size: 24px; }
        
        /* Layout */
        .main-content {
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .page-title {
            font-size: 24px;
            font-weight: 400;
            color: var(--md-on-bg);
            letter-spacing: 0;
        }
        
        /* Cards */
        .session-card, .glass-panel, .card {
            background-color: var(--md-surface);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--md-shadow-2);
            transition: box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }
        .session-card:hover, .glass-panel:hover, .card:hover {
            box-shadow: var(--md-shadow-8);
        }
        .session-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }
        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .session-title {
            font-size: 18px;
            font-weight: 500;
            color: var(--md-primary);
            margin-bottom: 8px;
        }
        .session-code {
            background-color: var(--md-surface-2);
            color: var(--md-on-surface);
            padding: 4px 8px;
            border-radius: var(--radius);
            font-family: monospace;
            font-size: 14px;
        }
        
        /* Badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-ready { background-color: rgba(3, 218, 198, 0.12); color: var(--md-secondary); }
        .status-live { background-color: rgba(187, 134, 252, 0.12); color: var(--md-primary); }
        .status-completed { background-color: rgba(255, 255, 255, 0.12); color: var(--md-on-surface); }
        .status-cancelled { background-color: rgba(207, 102, 121, 0.12); color: var(--md-error); }
        
        /* Stats */
        .session-stats {
            display: flex;
            justify-content: space-between;
            margin: 16px 0;
            padding: 16px;
            background-color: var(--md-surface-2);
            border-radius: var(--radius);
        }
        .stat-item { text-align: center; }
        .stat-value {
            font-size: 20px;
            font-weight: 500;
            color: var(--md-secondary);
        }
        .stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
        }
        
        /* Actions container */
        .session-actions, .actions {
            display: flex;
            gap: 12px;
            margin-top: auto;
            flex-wrap: wrap;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            height: 36px;
            border-radius: var(--radius);
            font-size: 14px;
            font-family: var(--font-family);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.25px;
            cursor: pointer;
            border: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }
        .btn-primary { 
            background-color: var(--md-primary); 
            color: var(--md-on-primary); 
            box-shadow: var(--md-shadow-2);
        }
        .btn-primary:hover:not(:disabled) { box-shadow: var(--md-shadow-4); filter: brightness(1.08); }
        
        .btn-secondary { 
            background-color: transparent; 
            color: var(--md-primary); 
            border: 1px solid rgba(187,134,252,0.5); 
        }
        .btn-secondary:hover:not(:disabled) { background-color: rgba(187,134,252,0.08); }
        
        .btn-success { 
            background-color: var(--md-secondary); 
            color: var(--md-on-secondary); 
            box-shadow: var(--md-shadow-2);
        }
        .btn-success:hover:not(:disabled) { box-shadow: var(--md-shadow-4); filter: brightness(1.08); }
        
        .btn-danger { 
            background-color: var(--md-error); 
            color: var(--md-on-error); 
            box-shadow: var(--md-shadow-2);
        }
        .btn-danger:hover:not(:disabled) { box-shadow: var(--md-shadow-4); filter: brightness(1.08); }
        
        .btn-sm { height: 32px; padding: 0 12px; font-size: 13px; }
        .btn-lg { height: 44px; padding: 0 24px; font-size: 15px; }
        .btn-icon { width: 36px; padding: 0; border-radius: 50%; }
        .btn:disabled { opacity: 0.38; cursor: not-allowed; box-shadow: none; }
        
        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            margin-bottom: 24px;
        }
        .tab {
            padding: 0 24px;
            height: 48px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.25px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
        }
        .tab:hover { color: var(--md-on-bg); background-color: rgba(255,255,255,0.04); }
        .tab.active {
            color: var(--md-primary);
            border-bottom-color: var(--md-primary);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Forms */
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.4px;
        }
        .form-control {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            background-color: var(--md-surface-2);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: var(--radius);
            color: var(--md-on-surface);
            font-family: var(--font-family);
            font-size: 16px;
            transition: border-color 0.2s;
        }
        textarea.form-control { min-height: 80px; padding: 12px; resize: vertical; }
        .form-control:focus {
            outline: none;
            border-color: var(--md-primary);
            background-color: var(--md-surface-3);
        }
        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            padding-right: 40px;
        }
        select.form-control option { background-color: var(--md-surface); color: var(--md-on-surface); }
        .form-check {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .form-check input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--md-primary);
        }
        .form-check label { color: var(--md-on-surface); font-size: 14px; cursor: pointer; }

        /* Modals */
        .modal {
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
            background: rgba(0, 0, 0, 0.6);
            display: none !important;
            align-items: center !important;
            justify-content: center !important;
            z-index: 1000 !important;
        }
        .modal.show { display: flex !important; animation: fadeInModal 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeInModal { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-content {
            background-color: var(--md-surface);
            border-radius: var(--radius);
            max-width: 560px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--md-shadow-16);
            display: flex;
            flex-direction: column;
            transform: scale(0.95);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal.show .modal-content { transform: scale(1); }
        .modal-content.modal-lg { max-width: 800px; }
        
        .modal-header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .modal-title { font-size: 20px; font-weight: 500; }
        .modal-body { padding: 24px; }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* Toasts */
        .toast {
            position: fixed;
            bottom: 24px; right: 24px;
            padding: 14px 24px;
            border-radius: var(--radius);
            background-color: var(--md-surface-3);
            color: var(--md-on-surface);
            box-shadow: var(--md-shadow-4);
            z-index: 2000;
            display: flex;
            align-items: center;
            font-size: 14px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast-success { border-left: 4px solid var(--md-secondary); }
        .toast-error { border-left: 4px solid var(--md-error); }
        .toast-info { border-left: 4px solid var(--md-primary); }

        /* Specific components */
        .center-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 64px);
            padding: 24px;
        }
        .join-panel, .setup-panel {
            width: 100%;
            max-width: 480px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: rgba(255,255,255,0.6);
        }
        .empty-state h3 { color: var(--md-on-surface); margin-bottom: 8px; }
        
        .cancel-all-section {
            background-color: rgba(207, 102, 121, 0.08);
            border-left: 4px solid var(--md-error);
            border-radius: 0 var(--radius) var(--radius) 0;
            padding: 16px 20px;
            margin-bottom: 24px;
        }
        .cancel-all-section h3 { color: var(--md-error); font-size: 16px; margin-bottom: 8px; }
        .cancel-all-section p { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 12px; }

        /* Story List */
        .story-list { list-style: none; }
        .story-item {
            background-color: var(--md-surface-2);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius);
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .story-item:hover { background-color: var(--md-surface-3); }
        .story-info { flex: 1; min-width: 0; }
        .story-number { font-weight: 500; color: var(--md-secondary); font-size: 13px; margin-right: 8px; }
        .story-title-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; }
        
        /* Grid Layouts for app */
        .metrics-grid, .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .metric-card {
            text-align: center;
            padding: 24px;
        }
        .metric-value { font-size: 36px; font-weight: 300; color: var(--md-secondary); }
        .metric-label { font-size: 13px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; }
        
        .main-layout { display: flex; gap: 24px; height: calc(100vh - 64px - 48px); }
        .sidebar { width: 320px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; padding-right: 8px; }
        .main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; height: auto; }
            .sidebar { width: 100%; overflow-y: visible; padding-right: 0; }
        }
        
        /* Card selections */
        .deck-container {
             display: flex;
             flex-wrap: wrap;
             gap: 16px;
             justify-content: center;
             padding: 24px;
        }
        .playing-card {
             width: 80px;
             height: 120px;
             background-color: var(--md-surface-2);
             border: 2px solid rgba(255,255,255,0.1);
             border-radius: 8px;
             display: flex;
             align-items: center;
             justify-content: center;
             font-size: 28px;
             font-weight: 500;
             color: var(--md-on-surface);
             cursor: pointer;
             transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
             user-select: none;
             box-shadow: var(--md-shadow-2);
        }
        .playing-card:hover { transform: translateY(-4px); box-shadow: var(--md-shadow-4); background-color: var(--md-surface-3); border-color: rgba(255,255,255,0.2); }
        .playing-card.selected { background-color: rgba(187, 134, 252, 0.15); border-color: var(--md-primary); color: var(--md-primary); box-shadow: var(--md-shadow-8); transform: translateY(-8px); }

        /* Tables */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 14px; }
        th { font-weight: 500; color: rgba(255,255,255,0.7); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:hover td { background-color: rgba(255,255,255,0.02); }
        
        /* Utils */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
</style>
</head>
<body>
    

    <!-- Hyperspace overlay -->
    
    

    

    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">Dashboard</h1>
            <button class="btn btn-primary" id="createSessionBtn">⟐ Initialize Session</button>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="live">◉ Active Sessions</button>
            <button class="tab" data-tab="planning">◈ Session Planning</button>
            <button class="tab" data-tab="completed">◇ Completed Sessions</button>
        </div>

        <div class="tab-content active" id="liveTab">
            <div class="session-grid" id="liveSessions"></div>
        </div>

        <div class="tab-content" id="planningTab">
            <div class="cancel-all-section" id="cancelAllSection" style="display: none;">
                <h3>⚠ THREAT LEVEL: MAXIMUM</h3>
                <p>Cancel all planned sessions that have not started. This action is irreversible.</p>
                <button class="btn btn-danger" id="cancelAllBtn">☠ Cancel All Planned Sessions</button>
            </div>
            <div class="session-grid" id="planningSessions"></div>
        </div>

        <div class="tab-content" id="completedTab">
            <div class="session-grid" id="completedSessions"></div>
        </div>
    </div>

    <!-- Create Session Modal -->
    <div class="modal" id="createSessionModal" role="dialog" aria-modal="true" aria-labelledby="createSessionModalTitle">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="createSessionModalTitle">⟐ Create New Session</h3>
                <button class="btn btn-secondary" data-dismiss="modal" aria-label="Close">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="sessionName">Session Name *</label>
                    <input type="text" class="form-control" id="sessionName" placeholder="Enter session name" maxlength="200" required />
                </div>
                <div class="form-group">
                    <label class="form-label" for="sessionDescription">Session Description</label>
                    <textarea class="form-control" id="sessionDescription" placeholder="Optional session description"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" for="scoringMethod">Scoring Protocol *</label>
                    <select class="form-control" id="scoringMethod" required>
                        <option value="">Select scoring protocol...</option>
                    </select>
                </div>
                <div class="form-check">
                    <input type="checkbox" id="allowSpectators" checked />
                    <label for="allowSpectators">Allow Observers</label>
                </div>
                <div class="form-check">
                    <input type="checkbox" id="easyMode" />
                    <label for="easyMode">Training Mode (Quick story creation)</label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-dismiss="modal">Abort</button>
                <button class="btn btn-primary" id="confirmCreateSessionBtn">◆ Start Session</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast" id="toast" role="alert" aria-live="assertive">
        <span id="toastMessage"></span>
    </div>

    <!-- Edit Session Modal -->
    <div class="modal" id="editSessionModal" role="dialog" aria-modal="true" aria-labelledby="editSessionModalTitle">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3 class="modal-title" id="editSessionModalTitle">◈ Session Settings</h3>
                <button class="btn btn-secondary" data-dismiss="modal" aria-label="Close">×</button>
            </div>
            <div class="modal-body">
                <div class="edit-tabs">
                    <button class="edit-tab active" data-edit-tab="details" role="tab" aria-selected="true">Session Parameters</button>
                    <button class="edit-tab" data-edit-tab="stories" role="tab" aria-selected="false">Storys <span class="story-count-badge" id="storyCountBadge">0</span></button>
                </div>

                <div class="edit-tab-content active" id="editDetailsTab" role="tabpanel">
                    <input type="hidden" id="editSessionId" />
                    <div class="form-group">
                        <label class="form-label" for="editSessionName">Session Name *</label>
                        <input type="text" class="form-control" id="editSessionName" placeholder="Enter session name" maxlength="200" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="editSessionDescription">Session Description</label>
                        <textarea class="form-control" id="editSessionDescription" placeholder="Optional session description"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="editScoringMethod">Scoring Protocol *</label>
                        <select class="form-control" id="editScoringMethod" required>
                            <option value="">Select scoring protocol...</option>
                        </select>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" id="editAllowSpectators" />
                        <label for="editAllowSpectators">Allow Observers</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" id="editEasyMode" />
                        <label for="editEasyMode">Training Mode (Quick story creation)</label>
                    </div>
                </div>

                <div class="edit-tab-content" id="editStoriesTab" role="tabpanel">
                    <div class="story-search-container">
                        <input type="text" class="story-search-input" id="storySearchInput" placeholder="Scan database for objectives..." autocomplete="off" />
                        <div class="story-search-results" id="storySearchResults"></div>
                    </div>

                    <div class="manual-story-form" id="manualStoryForm" style="display: none;">
                        <div class="form-group">
                            <label class="form-label">Story Title</label>
                            <input type="text" class="form-control" id="manualStoryTitle" placeholder="Story designation" />
                        </div>
                        <div class="form-group">
                            <label class="form-label">Intel</label>
                            <input type="text" class="form-control" id="manualStoryDesc" placeholder="Optional intel" />
                        </div>
                        <button class="btn btn-success btn-sm" id="addManualStoryBtn" style="margin-bottom:1rem;">+ Add</button>
                    </div>

                    <h4 style="margin-bottom: 0.75rem; font-family: Roboto, sans-serif, monospace; font-size: 0.85rem; color: var(--md-primary); letter-spacing: 2px; text-transform: uppercase;">Stories</h4>
                    <ul class="story-list" id="editStoryList">
                        <li class="empty-stories">No objectives loaded. Scan database above to add objectives.</li>
                    </ul>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-dismiss="modal">Abort</button>
                <button class="btn btn-primary" id="saveSessionBtn">◆ Confirm Changes</button>
            </div>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div class="modal" id="ppConfirmModal" role="dialog" aria-modal="true" aria-labelledby="ppConfirmTitle">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="ppConfirmTitle">Confirm</h3>
                <button class="btn btn-secondary" id="ppConfirmX" aria-label="Close">×</button>
            </div>
            <div class="modal-body">
                <p id="ppConfirmMsg" style="font-family: 'Roboto, sans-serif', monospace; color: rgba(200,214,229,0.8); font-size: 0.9rem; line-height: 1.6;"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="ppConfirmCancel">Cancel</button>
                <button class="btn btn-primary" id="ppConfirmOk">Confirm</button>
            </div>
        </div>
    </div>

    <script>
    //<![CDATA[
        // Safe AJAX response parser
        function parseAjaxResponse(response) {
            try {
                if (typeof response === 'string') {
                    return response ? JSON.parse(response) : null;
                }
                var xml = response.responseXML;
                if (!xml) return null;
                var answer = xml.documentElement.getAttribute('answer');
                if (!answer) {
                    var answerEl = xml.getElementsByTagName('answer');
                    if (answerEl && answerEl.length > 0) {
                        answer = answerEl[0].textContent || answerEl[0].text;
                    }
                }
                if (!answer) {
                    var resultEl = xml.getElementsByTagName('result');
                    if (resultEl && resultEl.length > 0) {
                        answer = resultEl[0].getAttribute('answer');
                    }
                }
                if (!answer) return null;
                return JSON.parse(answer);
            } catch (e) {
                console.error('Error parsing AJAX response:', e);
                return null;
            }
        }

        // Global variables
        var currentTab = 'live';
        var sessions = {
            live: [],
            planning: [],
            completed: []
        };
        var scoringMethods = [];
        var editingSessionId = null;
        var editingStories = [];
        var searchDebounceTimer = null;

        // Initialize page
        (function() { if (/[?&]scan\b/.test(location.search)) document.body.classList.add('scanlines-on'); })();
        document.addEventListener('DOMContentLoaded', function() {
            initializeEventListeners();
            loadInitialData();
        });
        
        // Event listeners
        function initializeEventListeners() {
            
            
            var tabs = document.querySelectorAll('.tab');
            tabs.forEach(function(tab) {
                tab.addEventListener('click', function() {
                    switchTab(tab.getAttribute('data-tab'));
                });
            });
            
            document.getElementById('createSessionBtn').addEventListener('click', function() {
                showModal('createSessionModal');
            });
            
            document.getElementById('confirmCreateSessionBtn').addEventListener('click', createSession);
            
            document.getElementById('cancelAllBtn').addEventListener('click', function() {
                ppConfirm('Abort All Sessions', 'Abort all planned sessions? This action cannot be reversed.', function(ok) {
                    if (ok) { cancelAllSessions(); }
                }, 'Abort All');
            });
            
            var dismissBtns = document.querySelectorAll('[data-dismiss="modal"]');
            dismissBtns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    hideAllModals();
                });
            });
            
            // Edit session modal tabs
            var editTabs = document.querySelectorAll('.edit-tab');
            editTabs.forEach(function(tab) {
                tab.addEventListener('click', function() {
                    switchEditTab(tab.getAttribute('data-edit-tab'));
                });
            });
            
            // Save session button
            document.getElementById('saveSessionBtn').addEventListener('click', saveSession);
            
            // Story search
            document.getElementById('storySearchInput').addEventListener('input', function() {
                clearTimeout(searchDebounceTimer);
                var term = this.value.trim();
                if (term.length < 2) {
                    document.getElementById('storySearchResults').classList.remove('show');
                    return;
                }
                searchDebounceTimer = setTimeout(function() {
                    searchStoriesForEdit(term);
                }, 300);
            });
            
            // Close search results on outside click
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.story-search-container')) {
                    document.getElementById('storySearchResults').classList.remove('show');
                }
            });
            
            // Easy mode toggle in edit modal
            document.getElementById('editEasyMode').addEventListener('change', function() {
                document.getElementById('manualStoryForm').style.display = this.checked ? 'flex' : 'none';
            });
            
            // Add manual story button
            document.getElementById('addManualStoryBtn').addEventListener('click', addManualStoryToSession);
        }
        
        // Load initial data
        function loadInitialData() {
            loadScoringMethods();
            loadSessions();
        }
        
        // Load scoring methods
        function loadScoringMethods() {
            var ga = new GlideAjax('SessionManagementAjax');
            ga.addParam('sysparm_name', 'getScoringMethods');
            ga.getXML(function(response) {
                var result = parseAjaxResponse(response);
                if (!result) { showToast('Error loading scoring methods', 'error'); return; }
                
                if (result.success) {
                    scoringMethods = result.data;
                    populateScoringMethods();
                } else {
                    showToast(result.message, 'error');
                }
            });
        }
        
        // Load sessions
        function loadSessions() {
            var statuses = ['live', 'ready', 'completed'];
            
            statuses.forEach(function(status) {
                var ga = new GlideAjax('SessionManagementAjax');
                ga.addParam('sysparm_name', 'getMySessions');
                ga.addParam('status', status);
                ga.getXML(function(response) {
                    var result = parseAjaxResponse(response);
                    if (!result) { showToast('Error loading ' + status + ' sessions', 'error'); return; }
                    
                    if (result.success) {
                        if (status === 'ready') {
                            sessions.planning = result.data;
                        } else {
                            sessions[status] = result.data;
                        }
                        renderSessions();
                    } else {
                        showToast('Error loading ' + status + ' sessions: ' + result.message, 'error');
                    }
                });
            });
        }
        
        // Populate dropdowns
        function populateScoringMethods() {
            var select = document.getElementById('scoringMethod');
            select.innerHTML = '<option value="">Select scoring method...</option>';
            
            scoringMethods.forEach(function(method) {
                var option = document.createElement('option');
                option.value = method.sys_id;
                option.textContent = method.name;
                if (method.isDefault) {
                    option.selected = true;
                }
                select.appendChild(option);
            });
        }
        
        // Switch tabs
        function switchTab(tabName) {
            currentTab = tabName;
            
            var tabs = document.querySelectorAll('.tab');
            tabs.forEach(function(tab) {
                tab.classList.toggle('active', tab.getAttribute('data-tab') === tabName);
            });
            
            var contents = document.querySelectorAll('.tab-content');
            contents.forEach(function(content) {
                content.classList.toggle('active', content.id === tabName + 'Tab');
            });
            
            var cancelAllSection = document.getElementById('cancelAllSection');
            if (tabName === 'planning' && sessions.planning.length > 0) {
                cancelAllSection.style.display = 'block';
            } else {
                cancelAllSection.style.display = 'none';
            }
        }
        
        // Render sessions
        function renderSessions() {
            renderSessionGrid('live', sessions.live);
            renderSessionGrid('planning', sessions.planning);
            renderSessionGrid('completed', sessions.completed);
        }
        
        function renderSessionGrid(type, sessionList) {
            var containerId = type + 'Sessions';
            var container = document.getElementById(containerId);
            
            if (sessionList.length === 0) {
                var emptyMessages = {
                    live: '<h3>No Active Sessions</h3><p>All good. Initialize a new session to begin.</p>',
                    planning: '<h3>No Sessions in Queue</h3><p>The dashboard is empty. Create a session to begin.</p>',
                    completed: '<h3>No Completed Sessionss</h3><p>No completed session logs found in the database.</p>'
                };
                container.innerHTML = '<div class="empty-state">' + (emptyMessages[type] || '<h3>No data</h3>') + '</div>';
                return;
            }
            
            container.innerHTML = '';
            
            sessionList.forEach(function(session) {
                var card = createSessionCard(session, type);
                container.appendChild(card);
            });
        }
        
        // Create session card with event delegation instead of inline onclick
        function createSessionCard(session, type) {
            var card = document.createElement('div');
            card.className = 'session-card';
            card.setAttribute('data-session-id', session.sys_id);
            card.setAttribute('data-session-code', session.sessionCode);
            
            var statusClass = 'status-' + session.status;
            var statusText = session.status.charAt(0).toUpperCase() + session.status.slice(1);
            
            var actionsHtml = '';
            if (type === 'planning') {
                actionsHtml = '<button class="btn btn-success btn-sm" data-action="goLive">▶ Start</button>' +
                             '<button class="btn btn-secondary btn-sm" data-action="editSession">◈ Configure</button>' +
                             '<button class="btn btn-danger btn-sm" data-action="deleteSession">⌧ Remove</button>';
            } else if (type === 'live') {
                actionsHtml = '<button class="btn btn-primary btn-sm" data-action="openVoting">◉ Join Session</button>' +
                             '<button class="btn btn-secondary btn-sm" data-action="copyJoinLink">⟐ Copy Link</button>' +
                             '<button class="btn btn-danger btn-sm" data-action="deleteSession">⌧ Remove</button>';
            } else if (type === 'completed') {
                actionsHtml = '<button class="btn btn-secondary btn-sm" data-action="viewStatistics">◇ Session Report</button>';
            }
            
            card.innerHTML = 
                '<div class="session-header">' +
                    '<div>' +
                        '<div class="session-title">' + escapeHtml(session.name) + '</div>' +
                        '<span class="status-badge ' + statusClass + '">' + statusText + '</span>' +
                    '</div>' +
                    '<div class="session-code">' + session.sessionCode + '</div>' +
                '</div>' +
                
                '<div class="session-meta">' +
                    '<span>⏱ ' + formatDate(session.createdOn) + '</span>' +
                    '<span>' + (session.easyMode ? '◇ Training' : '◆ Standard') + '</span>' +
                '</div>' +
                
                '<div class="session-stats">' +
                    '<div class="stat-item">' +
                        '<div class="stat-value">' + (session.totalStories || 0) + '</div>' +
                        '<div class="stat-label">Storys</div>' +
                    '</div>' +
                    '<div class="stat-item">' +
                        '<div class="stat-value">' + (session.storiesCompleted || 0) + '</div>' +
                        '<div class="stat-label">Complete</div>' +
                    '</div>' +
                    '<div class="stat-item">' +
                        '<div class="stat-value">' + (session.dealerCounts || 0) + '</div>' +
                        '<div class="stat-label">Moderators</div>' +
                    '</div>' +
                    '<div class="stat-item">' +
                        '<div class="stat-value">' + (session.voterCounts || 0) + '</div>' +
                        '<div class="stat-label">Voter</div>' +
                    '</div>' +
                '</div>' +
                
                '<div class="session-actions">' + actionsHtml + '</div>';
            
            // Add event delegation for action buttons
            card.addEventListener('click', function(e) {
                var target = e.target;
                var action = target.getAttribute('data-action');
                
                if (action) {
                    e.preventDefault();
                    handleSessionAction(action, session.sys_id, session.sessionCode);
                }
            });
                
            return card;
        }
        
        // Handle session actions with event delegation
        function handleSessionAction(action, sessionId, sessionCode) {
            switch (action) {
                case 'goLive':
                    goLive(sessionId);
                    break;
                case 'editSession':
                    editSession(sessionId);
                    break;
                case 'cancelSession':
                    cancelSession(sessionId);
                    break;
                case 'deleteSession':
                    deleteSession(sessionId);
                    break;
                case 'openVoting':
                    openVoting(sessionId);
                    break;
                case 'copyJoinLink':
                    copyJoinLink(sessionCode);
                    break;
                case 'viewStatistics':
                    viewStatistics(sessionId);
                    break;
            }
        }
        
        // Session actions
        function createSession() {
            var sessionName = document.getElementById('sessionName').value;
            var description = document.getElementById('sessionDescription').value;
            var scoringMethod = document.getElementById('scoringMethod').value;
            var allowSpectators = document.getElementById('allowSpectators').checked;
            var easyMode = document.getElementById('easyMode').checked;
            
            if (!sessionName || !scoringMethod) {
                showToast('Session name and scoring method are required', 'error');
                return;
            }
            
            var ga = new GlideAjax('SessionManagementAjax');
            ga.addParam('sysparm_name', 'createSession');
            ga.addParam('session_name', sessionName);
            ga.addParam('description', description);
            ga.addParam('scoring_method', scoringMethod);
            ga.addParam('allow_spectators', allowSpectators);
            ga.addParam('easy_mode', easyMode);
            ga.getXML(function(response) {
                var result = parseAjaxResponse(response);
                if (!result) { showToast('Error creating session', 'error'); return; }
                
                if (result.success) {
                    showToast('Session initialized — Ready to start', 'success');
                    hideAllModals();
                    clearCreateSessionForm();
                    loadSessions();
                } else {
                    showToast(result.message, 'error');
                }
            });
        }
        
        function goLive(sessionId) {
            ppConfirm('Start Session', 'Start this session? Voter will be able to join and vote.', function(ok) {
                if (!ok) return;
                var ga = new GlideAjax('SessionManagementAjax');
                ga.addParam('sysparm_name', 'goLiveSession');
                ga.addParam('session_id', sessionId);
                ga.getXML(function(response) {
                    var result = parseAjaxResponse(response);
                    if (!result) { showToast('Error going live', 'error'); return; }
                    if (result.success) {
                        showToast('Session is now LIVE — Session has started', 'success');
                        loadSessions();
                    } else {
                        showToast(result.message, 'error');
                    }
                });
            }, 'Start');
        }
        
        function cancelSession(sessionId) {
            ppConfirm('Cancel Session', 'Confirm session abort? This cannot be undone.', function(ok) {
                if (!ok) return;
                var ga = new GlideAjax('SessionManagementAjax');
                ga.addParam('sysparm_name', 'cancelSession');
                ga.addParam('session_id', sessionId);
                ga.getXML(function(response) {
                    var result = parseAjaxResponse(response);
                    if (!result) { showToast('Error cancelling session', 'error'); return; }
                    if (result.success) {
                        showToast('Session aborted successfully', 'success');
                        loadSessions();
                    } else {
                        showToast(result.message, 'error');
                    }
                });
            }, 'Abort');
        }
        
        function deleteSession(sessionId) {
            ppConfirm('Delete Session', 'Permanently delete this session? All stories, votes, and participants will be removed. This cannot be undone.', function(ok) {
                if (!ok) return;
                var ga = new GlideAjax('SessionManagementAjax');
                ga.addParam('sysparm_name', 'deleteSession');
                ga.addParam('session_id', sessionId);
                ga.getXML(function(response) {
                    var result = parseAjaxResponse(response);
                    if (!result) { showToast('Error deleting session', 'error'); return; }
                    if (result.success) {
                        showToast('Session permanently removed', 'success');
                        loadSessions();
                    } else {
                        showToast(result.message, 'error');
                    }
                });
            }, 'Delete');
        }

        function cancelAllSessions() {
            var planningSessions = sessions.planning.filter(function(s) { return s.status === 'ready'; });

            if (planningSessions.length === 0) {
                showToast('No planned sessions to terminate', 'info');
                return;
            }

            ppConfirm('Cancel All Sessions', 'Confirm: Terminate all ' + planningSessions.length + ' planned sessions? This cannot be undone.', function(ok) {
                if (!ok) return;
                var completed = 0;
                var failed = 0;
                var total = planningSessions.length;
                planningSessions.forEach(function(session) {
                    var ga = new GlideAjax('SessionManagementAjax');
                    ga.addParam('sysparm_name', 'cancelSession');
                    ga.addParam('session_id', session.sys_id);
                    ga.getXML(function(response) {
                        var result = parseAjaxResponse(response);
                        if (result && result.success) {
                            completed++;
                        } else {
                            failed++;
                        }
                        if (completed + failed === total) {
                            if (failed === 0) {
                                showToast('All ' + completed + ' sessions canceled', 'success');
                            } else {
                                showToast(completed + ' terminated, ' + failed + ' failed', 'error');
                            }
                            loadSessions();
                        }
                    });
                });
            }, 'Terminate All');
        }
        
        function openVoting(sessionId) {
            window.location.href = 'x_902080_planningw_voting_interface.do?session_id=' + sessionId;
        }
        
        function editSession(sessionId) {
            editingSessionId = sessionId;
            editingStories = [];
            
            // Populate scoring methods and groups dropdowns in edit modal
            populateEditDropdowns();
            
            // Load session details
            var ga = new GlideAjax('SessionManagementAjax');
            ga.addParam('sysparm_name', 'getSessionDetails');
            ga.addParam('session_id', sessionId);
            ga.getXML(function(response) {
                var result = parseAjaxResponse(response);
                if (!result) { showToast('Error loading session details', 'error'); return; }
                if (!result.success) { showToast(result.message, 'error'); return; }
                
                var data = result.data;
                
                // Populate form
                document.getElementById('editSessionId').value = data.sys_id;
                document.getElementById('editSessionName').value = data.name || '';
                document.getElementById('editSessionDescription').value = data.description || '';
                document.getElementById('editScoringMethod').value = data.scoringMethod || '';
                document.getElementById('editAllowSpectators').checked = data.allowSpectators;
                document.getElementById('editEasyMode').checked = data.easyMode;
                
                // Show/hide manual story form
                document.getElementById('manualStoryForm').style.display = data.easyMode ? 'flex' : 'none';
                
                // Populate stories
                editingStories = data.stories || [];
                renderEditStories();
                
                // Reset to details tab
                switchEditTab('details');
                
                showModal('editSessionModal');
            });
        }
        
        function viewStatistics(sessionId) {
            window.open('x_902080_planningw_session_statistics.do?session_id=' + sessionId, '_blank');
        }
        
        function copyJoinLink(sessionCode) {
            var joinUrl = window.location.protocol + '//' + window.location.host + '/x_902080_planningw_join.do?session_code=' + sessionCode;
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(joinUrl).then(function() {
                    showToast('Invite link copied to clipboard', 'success');
                }).catch(function() {
                    showToast('Unable to copy — try manually', 'error');
                });
            } else {
                var textArea = document.createElement('textarea');
                textArea.value = joinUrl;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast('Invite link copied to clipboard', 'success');
            }
        }
        
        // Utility functions
        
        // --- Edit Session Functions ---
        
        function switchEditTab(tabName) {
            var tabs = document.querySelectorAll('.edit-tab');
            tabs.forEach(function(tab) {
                tab.classList.toggle('active', tab.getAttribute('data-edit-tab') === tabName);
            });
            
            var contents = document.querySelectorAll('.edit-tab-content');
            contents.forEach(function(content) {
                content.classList.toggle('active', content.id === 'edit' + tabName.charAt(0).toUpperCase() + tabName.slice(1) + 'Tab');
            });
        }
        
        function populateEditDropdowns() {
            // Scoring methods
            var smSelect = document.getElementById('editScoringMethod');
            smSelect.innerHTML = '<option value="">Select scoring method...</option>';
            scoringMethods.forEach(function(method) {
                var option = document.createElement('option');
                option.value = method.sys_id;
                option.textContent = method.name;
                smSelect.appendChild(option);
            });
            
        }
        
        function renderEditStories() {
            var list = document.getElementById('editStoryList');
            var badge = document.getElementById('storyCountBadge');
            badge.textContent = editingStories.length;
            
            if (editingStories.length === 0) {
                list.innerHTML = '<li class="empty-stories">No stories added yet. Search above to add stories.</li>';
                return;
            }
            
            list.innerHTML = '';
            
            editingStories.forEach(function(story, index) {
                var li = document.createElement('li');
                li.className = 'story-item';
                li.setAttribute('draggable', 'true');
                li.setAttribute('data-index', index);
                li.setAttribute('data-story-id', story.sys_id);
                
                li.innerHTML = 
                    '<span class="drag-handle" title="Drag to reorder">⠿</span>' +
                    '<div class="story-info">' +
                        '<span class="story-number">' + escapeHtml(story.story_number || '') + '</span> ' +
                        '<span class="story-title-text">' + escapeHtml(story.story_title || '') + '</span>' +
                    '</div>' +
                    '<span class="story-status">' + escapeHtml(story.status || 'pending') + '</span>' +
                    '<button class="btn btn-danger btn-sm" data-remove-story="' + story.sys_id + '" title="Remove story">✕</button>';
                
                // Drag events
                li.addEventListener('dragstart', handleDragStart);
                li.addEventListener('dragover', handleDragOver);
                li.addEventListener('dragenter', handleDragEnter);
                li.addEventListener('dragleave', handleDragLeave);
                li.addEventListener('drop', handleDrop);
                li.addEventListener('dragend', handleDragEnd);
                
                // Remove button
                li.querySelector('[data-remove-story]').addEventListener('click', function() {
                    removeStoryFromSession(story.sys_id);
                });
                
                list.appendChild(li);
            });
        }
        
        // Drag and drop support
        var dragSrcIndex = null;
        
        function handleDragStart(e) {
            dragSrcIndex = parseInt(this.getAttribute('data-index'));
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', dragSrcIndex);
        }
        
        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }
        
        function handleDragEnter(e) {
            e.preventDefault();
            this.style.borderTop = '2px solid var(--md-primary)';
        }
        
        function handleDragLeave() {
            this.style.borderTop = '';
        }
        
        function handleDrop(e) {
            e.preventDefault();
            this.style.borderTop = '';
            var targetIndex = parseInt(this.getAttribute('data-index'));
            
            if (dragSrcIndex !== null && dragSrcIndex !== targetIndex) {
                // Reorder array
                var moved = editingStories.splice(dragSrcIndex, 1)[0];
                editingStories.splice(targetIndex, 0, moved);
                renderEditStories();
            }
        }
        
        function handleDragEnd() {
            this.classList.remove('dragging');
            var items = document.querySelectorAll('.story-item');
            items.forEach(function(item) {
                item.style.borderTop = '';
            });
        }
        
        function searchStoriesForEdit(searchTerm) {
            var ga = new GlideAjax('SessionManagementAjax');
            ga.addParam('sysparm_name', 'searchStories');
            ga.addParam('search_term', searchTerm);
            ga.addParam('limit', '15');
            ga.getXML(function(response) {
                try {
                    var result = parseAjaxResponse(response);
                    if (!result || !result.success) {
                        return;
                    }
                    
                    var container = document.getElementById('storySearchResults');
                    container.innerHTML = '';
                    
                    if (result.data.length === 0) {
                        container.innerHTML = '<div class="search-result-item disabled">No stories found</div>';
                        container.classList.add('show');
                        return;
                    }
                    
                    // Build set of already-added story IDs (by rm_story reference)
                    var addedStoryIds = {};
                    editingStories.forEach(function(s) {
                        if (s.story) addedStoryIds[s.story] = true;
                    });
                    
                    result.data.forEach(function(story) {
                        var div = document.createElement('div');
                        var isAdded = addedStoryIds[story.sys_id] || false;
                        div.className = 'search-result-item' + (isAdded ? ' disabled' : '');
                        div.innerHTML = 
                            '<div>' +
                                '<strong>' + escapeHtml(story.number) + '</strong> - ' +
                                escapeHtml(story.short_description || '') +
                            '</div>' +
                            '<div>' + (isAdded ? '<span style="color:#999;">Already added</span>' : '') + '</div>';
                        
                        if (!isAdded) {
                            div.addEventListener('click', function() {
                                addStoryToSession(story.sys_id);
                                container.classList.remove('show');
                                document.getElementById('storySearchInput').value = '';
                            });
                        }
                        
                        container.appendChild(div);
                    });
                    
                    container.classList.add('show');
                } catch (e) {
                    console.error('Error handling search results:', e);
                }
            });
        }
        
        function addStoryToSession(storyId) {
            if (!editingSessionId) return;
            
            var ga = new GlideAjax('SessionManagementAjax');
            ga.addParam('sysparm_name', 'addStories');
            ga.addParam('session_id', editingSessionId);
            ga.addParam('story_ids', storyId);
            ga.getXML(function(response) {
                var result = parseAjaxResponse(response);
                if (!result) { showToast('Error adding objective', 'error'); return; }
                if (result.success) {
                    showToast('Story added to session', 'success');
                    refreshEditStories();
                } else {
                    showToast(result.message, 'error');
                }
            });
        }
        
        function removeStoryFromSession(sessionStoryId) {
            if (!editingSessionId) return;
            ppConfirm('Remove Story', 'Remove this objective from the session?', function(ok) {
                if (!ok) return;
                var ga = new GlideAjax('SessionManagementAjax');
                ga.addParam('sysparm_name', 'removeStory');
                ga.addParam('session_id', editingSessionId);
                ga.addParam('session_story_id', sessionStoryId);
                ga.getXML(function(response) {
                    var result = parseAjaxResponse(response);
                    if (!result) { showToast('Error removing objective', 'error'); return; }
                    if (result.success) {
                        showToast('Story removed', 'success');
                        refreshEditStories();
                    } else {
                        showToast(result.message, 'error');
                    }
                });
            });
        }
        
        function addManualStoryToSession() {
            if (!editingSessionId) return;
            
            var title = document.getElementById('manualStoryTitle').value.trim();
            var desc = document.getElementById('manualStoryDesc').value.trim();
            
            if (!title) {
                showToast('Story title is required', 'error');
                return;
            }
            
            var ga = new GlideAjax('SessionManagementAjax');
            ga.addParam('sysparm_name', 'addManualStory');
            ga.addParam('session_id', editingSessionId);
            ga.addParam('title', title);
            ga.addParam('description', desc);
            ga.getXML(function(response) {
                var result = parseAjaxResponse(response);
                if (!result) { showToast('Error adding manual objective', 'error'); return; }
                if (result.success) {
                    showToast('Manual objective added', 'success');
                    document.getElementById('manualStoryTitle').value = '';
                    document.getElementById('manualStoryDesc').value = '';
                    refreshEditStories();
                } else {
                    showToast(result.message, 'error');

        function refreshEditStories() {
            var ga = new GlideAjax('SessionManagementAjax');
            ga.addParam('sysparm_name', 'getSessionDetails');
            ga.addParam('session_id', editingSessionId);
            ga.getXML(function(response) {
                var result = parseAjaxResponse(response);
                if (!result) return;
                if (result.success) {
                    editingStories = result.data.stories || [];
                    renderEditStories();
                }
            });
        }
        
        function saveSession() {
            var sessionId = document.getElementById('editSessionId').value;
            var sessionName = document.getElementById('editSessionName').value.trim();
            var scoringMethod = document.getElementById('editScoringMethod').value;
            
            if (!sessionName) {
                showToast('Session name is required', 'error');
                return;
            }
            if (!scoringMethod) {
                showToast('Scoring method is required', 'error');
                return;
            }
            
            // Save session properties
            var ga = new GlideAjax('SessionManagementAjax');
            ga.addParam('sysparm_name', 'updateSession');
            ga.addParam('session_id', sessionId);
            ga.addParam('session_name', sessionName);
            ga.addParam('description', document.getElementById('editSessionDescription').value);
            ga.addParam('scoring_method', scoringMethod);
            ga.addParam('allow_spectators', document.getElementById('editAllowSpectators').checked.toString());
            ga.addParam('easy_mode', document.getElementById('editEasyMode').checked.toString());
            ga.getXML(function(response) {
                var result = parseAjaxResponse(response);
                if (!result) { showToast('Error saving session', 'error'); return; }
                if (result.success) {
                    // Save story order if stories were reordered
                    saveStoryOrder(sessionId, function() {
                        showToast('Session configuration saved', 'success');
                        hideAllModals();
                        loadSessions();
                    });
                } else {
                    showToast(result.message, 'error');
                }
            });
        }
        
        function saveStoryOrder(sessionId, callback) {
            if (editingStories.length === 0) {
                callback();
                return;
            }
            
            var orderData = editingStories.map(function(story, index) {
                return { sys_id: story.sys_id, order: index + 1 };
            });
            
            var ga = new GlideAjax('SessionManagementAjax');
            ga.addParam('sysparm_name', 'reorderStories');
            ga.addParam('session_id', sessionId);
            ga.addParam('story_order', JSON.stringify(orderData));
            ga.getXML(function(response) {
                var result = parseAjaxResponse(response);
                if (result && !result.success) {
                    console.error('Error saving objective order:', result.message);
                }
                callback();
            });
        }

        var _ppConfirmCallback = null;
        (function() {
            function _bindOnce(id, evt, fn) {
                var el = document.getElementById(id);
                if (el) { el.addEventListener(evt, fn); }
            }
            function _closeConfirm(result) {
                hideAllModals();
                var cb = _ppConfirmCallback;
                _ppConfirmCallback = null;
                if (cb) { cb(result); }
            }
            _bindOnce('ppConfirmOk',     'click', function() { _closeConfirm(true); });
            _bindOnce('ppConfirmCancel', 'click', function() { _closeConfirm(false); });
            _bindOnce('ppConfirmX',      'click', function() { _closeConfirm(false); });
        }());

        function ppConfirm(title, message, onConfirm, confirmLabel) {
            document.getElementById('ppConfirmTitle').textContent = title;
            document.getElementById('ppConfirmMsg').textContent = message;
            var okBtn = document.getElementById('ppConfirmOk');
            okBtn.textContent = confirmLabel || 'Confirm';
            _ppConfirmCallback = onConfirm;
            showModal('ppConfirmModal');

        function hideAllModals() {
            var modals = document.querySelectorAll('.modal');
            modals.forEach(function(modal) {
                modal.classList.remove('show');
            });
        }
        
        var _toastTimer = null;
        function showToast(message, type) {
            var toast = document.getElementById('toast');
            var toastMessage = document.getElementById('toastMessage');
            
            if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
            
            toastMessage.textContent = message;
            toast.className = 'toast toast-' + type + ' show';
            
            _toastTimer = setTimeout(function() {
                toast.classList.remove('show');
                _toastTimer = null;
            }, 3000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            var date = new Date(dateString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
