<?xml version="1.0" encoding="utf-8"?>
<j:jelly trim="false" xmlns:j="jelly:core" xmlns:g="glide">
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Planning Poker - Docking Bay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

        :root {
            --md-bg: #121212;
            --md-surface: #1E1E1E;
            --md-surface-2: #272727;
            --md-surface-3: #2C2C2C;
            --md-primary: #BB86FC;
            --md-primary-variant: #3700B3;
            --md-secondary: #03DAC6;
            --md-error: #CF6679;
            --md-on-primary: #000000;
            --md-on-secondary: #000000;
            --md-on-bg: #FFFFFF;
            --md-on-surface: #E0E0E0;
            --md-on-error: #000000;
            --md-shadow-1: 0 2px 1px -1px rgba(0,0,0,.2), 0 1px 1px 0 rgba(0,0,0,.14), 0 1px 3px 0 rgba(0,0,0,.12);
            --md-shadow-2: 0 3px 1px -2px rgba(0,0,0,.2), 0 2px 2px 0 rgba(0,0,0,.14), 0 1px 5px 0 rgba(0,0,0,.12);
            --md-shadow-4: 0 2px 4px -1px rgba(0,0,0,.2), 0 4px 5px 0 rgba(0,0,0,.14), 0 1px 10px 0 rgba(0,0,0,.12);
            --md-shadow-8: 0 5px 5px -3px rgba(0,0,0,.2), 0 8px 10px 1px rgba(0,0,0,.14), 0 3px 14px 2px rgba(0,0,0,.12);
            --md-shadow-16: 0 8px 10px -5px rgba(0,0,0,.2), 0 16px 24px 2px rgba(0,0,0,.14), 0 6px 30px 5px rgba(0,0,0,.12);
            --radius: 4px;
            --font-family: 'Roboto', -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, sans-serif;
            --base-font-size: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html { font-size: var(--base-font-size); background-color: var(--md-bg); }
        
        body {
            font-family: var(--font-family);
            background-color: var(--md-bg);
            color: var(--md-on-bg);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }
        
        /* Base typography & elements */
        h1, h2, h3, h4, h5, h6 { font-weight: 500; letter-spacing: 0.15px; }
        
        /* Header */
        .header {
            background-color: var(--md-surface-2);
            box-shadow: var(--md-shadow-4);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
        }
        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .logo {
            font-size: 20px;
            font-weight: 500;
            color: var(--md-primary);
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 0.15px;
        }
        .logo-icon { font-size: 24px; }
        
        /* Layout */
        .main-content {
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .page-title {
            font-size: 24px;
            font-weight: 400;
            color: var(--md-on-bg);
            letter-spacing: 0;
        }
        
        /* Cards */
        .session-card, .glass-panel, .card {
            background-color: var(--md-surface);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--md-shadow-2);
            transition: box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }
        .session-card:hover, .glass-panel:hover, .card:hover {
            box-shadow: var(--md-shadow-8);
        }
        .session-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }
        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .session-title {
            font-size: 18px;
            font-weight: 500;
            color: var(--md-primary);
            margin-bottom: 8px;
        }
        .session-code {
            background-color: var(--md-surface-2);
            color: var(--md-on-surface);
            padding: 4px 8px;
            border-radius: var(--radius);
            font-family: monospace;
            font-size: 14px;
        }
        
        /* Badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-ready { background-color: rgba(3, 218, 198, 0.12); color: var(--md-secondary); }
        .status-live { background-color: rgba(187, 134, 252, 0.12); color: var(--md-primary); }
        .status-completed { background-color: rgba(255, 255, 255, 0.12); color: var(--md-on-surface); }
        .status-cancelled { background-color: rgba(207, 102, 121, 0.12); color: var(--md-error); }
        
        /* Stats */
        .session-stats {
            display: flex;
            justify-content: space-between;
            margin: 16px 0;
            padding: 16px;
            background-color: var(--md-surface-2);
            border-radius: var(--radius);
        }
        .stat-item { text-align: center; }
        .stat-value {
            font-size: 20px;
            font-weight: 500;
            color: var(--md-secondary);
        }
        .stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
        }
        
        /* Actions container */
        .session-actions, .actions {
            display: flex;
            gap: 12px;
            margin-top: auto;
            flex-wrap: wrap;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            height: 36px;
            border-radius: var(--radius);
            font-size: 14px;
            font-family: var(--font-family);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.25px;
            cursor: pointer;
            border: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }
        .btn-primary { 
            background-color: var(--md-primary); 
            color: var(--md-on-primary); 
            box-shadow: var(--md-shadow-2);
        }
        .btn-primary:hover:not(:disabled) { box-shadow: var(--md-shadow-4); filter: brightness(1.08); }
        
        .btn-secondary { 
            background-color: transparent; 
            color: var(--md-primary); 
            border: 1px solid rgba(187,134,252,0.5); 
        }
        .btn-secondary:hover:not(:disabled) { background-color: rgba(187,134,252,0.08); }
        
        .btn-success { 
            background-color: var(--md-secondary); 
            color: var(--md-on-secondary); 
            box-shadow: var(--md-shadow-2);
        }
        .btn-success:hover:not(:disabled) { box-shadow: var(--md-shadow-4); filter: brightness(1.08); }
        
        .btn-danger { 
            background-color: var(--md-error); 
            color: var(--md-on-error); 
            box-shadow: var(--md-shadow-2);
        }
        .btn-danger:hover:not(:disabled) { box-shadow: var(--md-shadow-4); filter: brightness(1.08); }
        
        .btn-sm { height: 32px; padding: 0 12px; font-size: 13px; }
        .btn-lg { height: 44px; padding: 0 24px; font-size: 15px; }
        .btn-icon { width: 36px; padding: 0; border-radius: 50%; }
        .btn:disabled { opacity: 0.38; cursor: not-allowed; box-shadow: none; }
        
        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            margin-bottom: 24px;
        }
        .tab {
            padding: 0 24px;
            height: 48px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.25px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
        }
        .tab:hover { color: var(--md-on-bg); background-color: rgba(255,255,255,0.04); }
        .tab.active {
            color: var(--md-primary);
            border-bottom-color: var(--md-primary);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Forms */
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.4px;
        }
        .form-control {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            background-color: var(--md-surface-2);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: var(--radius);
            color: var(--md-on-surface);
            font-family: var(--font-family);
            font-size: 16px;
            transition: border-color 0.2s;
        }
        textarea.form-control { min-height: 80px; padding: 12px; resize: vertical; }
        .form-control:focus {
            outline: none;
            border-color: var(--md-primary);
            background-color: var(--md-surface-3);
        }
        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            padding-right: 40px;
        }
        select.form-control option { background-color: var(--md-surface); color: var(--md-on-surface); }
        .form-check {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .form-check input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--md-primary);
        }
        .form-check label { color: var(--md-on-surface); font-size: 14px; cursor: pointer; }

        /* Modals */
        .modal {
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
            background: rgba(0, 0, 0, 0.6);
            display: none !important;
            align-items: center !important;
            justify-content: center !important;
            z-index: 1000 !important;
        }
        .modal.show { display: flex !important; animation: fadeInModal 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeInModal { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-content {
            background-color: var(--md-surface);
            border-radius: var(--radius);
            max-width: 560px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--md-shadow-16);
            display: flex;
            flex-direction: column;
            transform: scale(0.95);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal.show .modal-content { transform: scale(1); }
        .modal-content.modal-lg { max-width: 800px; }
        
        .modal-header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .modal-title { font-size: 20px; font-weight: 500; }
        .modal-body { padding: 24px; }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* Toasts */
        .toast {
            position: fixed;
            bottom: 24px; right: 24px;
            padding: 14px 24px;
            border-radius: var(--radius);
            background-color: var(--md-surface-3);
            color: var(--md-on-surface);
            box-shadow: var(--md-shadow-4);
            z-index: 2000;
            display: flex;
            align-items: center;
            font-size: 14px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast-success { border-left: 4px solid var(--md-secondary); }
        .toast-error { border-left: 4px solid var(--md-error); }
        .toast-info { border-left: 4px solid var(--md-primary); }

        /* Specific components */
        .center-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 64px);
            padding: 24px;
        }
        .join-panel, .setup-panel {
            width: 100%;
            max-width: 480px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: rgba(255,255,255,0.6);
        }
        .empty-state h3 { color: var(--md-on-surface); margin-bottom: 8px; }
        
        .cancel-all-section {
            background-color: rgba(207, 102, 121, 0.08);
            border-left: 4px solid var(--md-error);
            border-radius: 0 var(--radius) var(--radius) 0;
            padding: 16px 20px;
            margin-bottom: 24px;
        }
        .cancel-all-section h3 { color: var(--md-error); font-size: 16px; margin-bottom: 8px; }
        .cancel-all-section p { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 12px; }

        /* Story List */
        .story-list { list-style: none; }
        .story-item {
            background-color: var(--md-surface-2);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius);
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .story-item:hover { background-color: var(--md-surface-3); }
        .story-info { flex: 1; min-width: 0; }
        .story-number { font-weight: 500; color: var(--md-secondary); font-size: 13px; margin-right: 8px; }
        .story-title-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; }
        
        /* Grid Layouts for app */
        .metrics-grid, .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .metric-card {
            text-align: center;
            padding: 24px;
        }
        .metric-value { font-size: 36px; font-weight: 300; color: var(--md-secondary); }
        .metric-label { font-size: 13px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; }
        
        .main-layout { display: flex; gap: 24px; height: calc(100vh - 64px - 48px); }
        .sidebar { width: 320px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; padding-right: 8px; }
        .main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; height: auto; }
            .sidebar { width: 100%; overflow-y: visible; padding-right: 0; }
        }
        
        /* Card selections */
        .deck-container {
             display: flex;
             flex-wrap: wrap;
             gap: 16px;
             justify-content: center;
             padding: 24px;
        }
        .playing-card {
             width: 80px;
             height: 120px;
             background-color: var(--md-surface-2);
             border: 2px solid rgba(255,255,255,0.1);
             border-radius: 8px;
             display: flex;
             align-items: center;
             justify-content: center;
             font-size: 28px;
             font-weight: 500;
             color: var(--md-on-surface);
             cursor: pointer;
             transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
             user-select: none;
             box-shadow: var(--md-shadow-2);
        }
        .playing-card:hover { transform: translateY(-4px); box-shadow: var(--md-shadow-4); background-color: var(--md-surface-3); border-color: rgba(255,255,255,0.2); }
        .playing-card.selected { background-color: rgba(187, 134, 252, 0.15); border-color: var(--md-primary); color: var(--md-primary); box-shadow: var(--md-shadow-8); transform: translateY(-8px); }

        /* Tables */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 14px; }
        th { font-weight: 500; color: rgba(255,255,255,0.7); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:hover td { background-color: rgba(255,255,255,0.02); }
        
        /* Utils */
        .hidden { display: none !important; }
        .text-center { text-align: center; }

        /* Join page specific */
        .join-container {
            background-color: var(--md-surface); border-radius: var(--radius);
            padding: 40px; border: 1px solid rgba(255,255,255,0.05);
            box-shadow: var(--md-shadow-4); width: 100%; max-width: 520px;
            text-align: center; position: relative; z-index: 1;
        }
        .title {
            font-size: 24px; font-weight: 500; color: var(--md-primary);
            margin-bottom: 8px; letter-spacing: 0.5px;
        }
        .subtitle {
            color: rgba(255,255,255,0.5); margin-bottom: 32px;
            font-size: 14px;
        }
        .session-info {
            background-color: var(--md-surface-2); border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
            text-align: left; display: none;
        }
        .session-name {
            font-size: 18px; font-weight: 500; margin-bottom: 8px;
            color: var(--md-on-bg);
        }
        .session-details {
            color: rgba(255,255,255,0.5); margin-bottom: 12px; font-size: 14px;
        }
        .error-message {
            background-color: rgba(207,102,121,0.08); border: 1px solid rgba(207,102,121,0.2);
            color: var(--md-error); padding: 12px 16px; border-radius: var(--radius);
            margin-bottom: 12px; display: none; font-size: 14px;
        }
        .success-message {
            background-color: rgba(3,218,198,0.08); border: 1px solid rgba(3,218,198,0.2);
            color: var(--md-secondary); padding: 12px 16px; border-radius: var(--radius);
            margin-bottom: 12px; display: none; font-size: 14px;
        }
        .loading { display: none; margin: 16px 0; }
        .spinner {
            border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--md-primary);
            border-radius: 50%; width: 30px; height: 30px;
            animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading p { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 8px; }
        .help-text { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 12px; }
        .back-link { margin-top: 24px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.08); }
        .back-link a { color: var(--md-primary); text-decoration: none; font-size: 14px; transition: all 0.2s; }
        .back-link a:hover { filter: brightness(1.2); }

        @media (max-width: 768px) {
            .join-container { margin: 16px; padding: 24px; }
            .title { font-size: 20px; }
        }
</style>
</head>
<body>

    <div style="position:fixed;top:1rem;right:1rem;z-index:100;">
    </div>

    <div class="join-container">
        <div class="logo">🃏</div>
        <h1 class="title">Planning Poker</h1>
        <p class="subtitle">// ENTER DOCKING CODE TO JOIN SESSION</p>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="joinForm">
            <div class="form-group">
                <label class="form-label" for="sessionCode">Docking Code</label>
                <input 
                    type="text" 
                    class="form-control" 
                    id="sessionCode" 
                    placeholder="ABC-1234"
                    maxlength="9"
                    pattern="[A-Z0-9]{3}-[A-Z0-9]{4}"
                    required 
                />
                <div class="help-text">
                    // Transmit code provided by your session moderator
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="findSessionBtn">
                ◇ Scan for Session
            </button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Scanning frequencies...</p>
        </div>

        <div class="session-info" id="sessionInfo">
            <div class="session-name" id="sessionName"></div>
            <div class="session-details">
                <div>session Moderator: <span id="dealerName"></span></div>
                <div>Status: <span class="status-badge" id="sessionStatus"></span></div>
                <div id="sessionDescription"></div>
            </div>
            <button class="btn btn-success" id="joinSessionBtn">
                ◆ Dock with Session
            </button>
        </div>

        <div class="back-link">
            <a href="x_902080_planningw_session_management.do">← Return to Dashboard</a>
        </div>
    </div>

    <script>
    //<![CDATA[
        // Star field
        (function() {
            
            if (!canvas) return;
            var ctx = canvas.getContext('2d');
            var stars = [];
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            resize();
            window.addEventListener('resize', resize);
            for (var i = 0; i < 120; i++) {
                stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 1.5 + 0.3, s: Math.random() * 0.3 + 0.05, a: Math.random() });
            }
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(function(st) {
                    st.a += st.s * 0.02;
                    var alpha = 0.3 + Math.sin(st.a) * 0.4;
                    ctx.beginPath();
                    ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 212, 255, ' + Math.max(0.1, alpha) + ')';
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        })();

        // Safe AJAX response parser
        function parseAjaxResponse(response) {
            try {
                // Handle string response (from getXMLAnswer)
                if (typeof response === 'string') {
                    return response ? JSON.parse(response) : null;
                }
                var xml = response.responseXML;
                if (!xml) return null;
                var answer = xml.documentElement.getAttribute('answer');
                if (!answer) {
                    // Fallback: try to find answer element in batched response
                    var answerEl = xml.getElementsByTagName('answer');
                    if (answerEl && answerEl.length > 0) {
                        answer = answerEl[0].textContent || answerEl[0].text;
                    }
                }
                if (!answer) {
                    // Additional fallback: check result elements (batched response format)
                    var resultEl = xml.getElementsByTagName('result');
                    if (resultEl && resultEl.length > 0) {
                        answer = resultEl[0].getAttribute('answer');
                    }
                }
                if (!answer) return null;
                return JSON.parse(answer);
            } catch (e) {
                console.error('Error parsing AJAX response:', e);
                return null;
            }
        }

        var foundSession = null;
        var urlSessionCode = getUrlParameter('session_code');

        (function() { if (/[?&]scan\b/.test(location.search)) document.body.classList.add('scanlines-on'); })();
        document.addEventListener('DOMContentLoaded', function() {
            
            initializeEventListeners();
            
            // Auto-populate from URL parameter
            if (urlSessionCode) {
                document.getElementById('sessionCode').value = urlSessionCode;
                findSession();
            }
        });

                    btn.addEventListener('click', function() {
                
                
                localStorage.setItem('pp_red_alert', isRedAlert);
            });
        }

        function initializeEventListeners() {
            document.getElementById('joinForm').addEventListener('submit', function(e) {
                e.preventDefault();
                findSession();
            });

            document.getElementById('joinSessionBtn').addEventListener('click', joinSession);

            // Format session code as user types
            document.getElementById('sessionCode').addEventListener('input', function(e) {
                var value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
                
                if (value.length > 3 && value.indexOf('-') === -1) {
                    value = value.substring(0, 3) + '-' + value.substring(3, 7);
                }
                
                e.target.value = value;
            });
        }

        function findSession() {
            var sessionCode = document.getElementById('sessionCode').value.trim();
            
            if (!sessionCode) {
                showError('Docking code required');
                return;
            }

            if (sessionCode.length < 7) {
                hideSessionInfo();
                showError('Invalid docking code format — use ABC-1234');
                return;
            }

            showLoading(true);
            hideMessages();

            var ga = new GlideAjax('SessionParticipantAjax');
            ga.addParam('sysparm_name', 'getSessionByCode');
            ga.addParam('session_code', sessionCode);
            ga.getXML(function(response) {
                showLoading(false);
                
                var result = parseAjaxResponse(response);
                if (!result) { showError('Comm link failure — sensor sweep failed'); return; }
                
                if (result.success) {
                    foundSession = result.data;
                    displaySessionInfo(foundSession);
                } else {
                    showError(result.message);
                    hideSessionInfo();
                }
            });
        }

        function displaySessionInfo(session) {
            document.getElementById('sessionName').textContent = session.name;
            document.getElementById('dealerName').textContent = session.dealerName;
            document.getElementById('sessionStatus').textContent = session.status;
            document.getElementById('sessionStatus').className = 'status-badge status-' + session.status;
            
            var descriptionEl = document.getElementById('sessionDescription');
            if (session.description) {
                descriptionEl.innerHTML = '<div style="margin-top: 0.5rem;">' + escapeHtml(session.description) + '</div>';
            } else {
                descriptionEl.innerHTML = '';
            }

            // Update join button based on session status
            var joinBtn = document.getElementById('joinSessionBtn');
            if (session.status === 'completed') {
                joinBtn.textContent = 'Session Complete';
                joinBtn.disabled = true;
            } else if (session.status === 'cancelled') {
                joinBtn.textContent = 'Session Aborted';
                joinBtn.disabled = true;
            } else {
                joinBtn.textContent = '◆ Dock with Session';
                joinBtn.disabled = false;
            }

            document.getElementById('sessionInfo').style.display = 'block';
        }

        function joinSession() {
            if (!foundSession) {
                showError('No session selected');
                return;
            }

            showLoading(true);
            hideMessages();
            document.getElementById('joinSessionBtn').disabled = true;

            var ga = new GlideAjax('SessionParticipantAjax');
            ga.addParam('sysparm_name', 'joinSession');
            ga.addParam('session_code', foundSession.sessionCode);
            ga.getXML(function(response) {
                showLoading(false);
                document.getElementById('joinSessionBtn').disabled = false;
                
                var result = parseAjaxResponse(response);
                if (!result) { showError('Comm link failure — docking error'); return; }
                
                if (result.success) {
                    showSuccess('Docking complete. Role assigned: ' + result.data.role);
                    
                    // Redirect to voting interface after short delay
                    setTimeout(function() {
                        window.location.href = 'x_902080_planningw_voting_interface.do?session_id=' + result.data.sessionId;
                    }, 1500);
                } else {
                    showError(result.message);
                }
            });
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('findSessionBtn').disabled = show;
        }

        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function showError(message) {
            var errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function showSuccess(message) {
            var successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.style.display = 'block';
        }

        function hideSessionInfo() {
            document.getElementById('sessionInfo').style.display = 'none';
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }
